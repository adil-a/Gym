benchflow_agent:
  responses_api_agents:
    benchflow_agent:
      # Python module entrypoint loaded by NeMo Gym.
      entrypoint: app.py
      domain: agent
      description: BenchFlow integration for running agentic benchmarks (e.g. SkillsBench).
      value: Evaluate models on agentic benchmarks via BenchFlow.

      # Max number of concurrent `/run` requests handled by the NeMo Gym agent server process.
      concurrency: 10

      # Local directory of BenchFlow task definitions (e.g. a SkillsBench `tasks/` dir).
      tasks_dir: "data/tasks"
      # Output directory for BenchFlow results/artifacts/logs.
      jobs_dir: "jobs"

      # BenchFlow agent harness.
      agent: openhands
      # Skill mode: "with-skill" | "no-skill" | "self-gen".
      skill_mode: with-skill
      # Skills directory passed to BenchFlow ("auto" = use task-bundled skills, None = do not use skills).
      skills_dir: auto

      # Overrides to apply to every task's task.toml. Example:
      #   task_config_overrides:
      #     environment:
      #       memory_mb: 131072
      #     agent:
      #       timeout_sec: 1000000000.0
      task_config_overrides: null

      # Directory of prebuilt per-task Singularity .sif images. Files must be named "<task_name>.sif".
      images_dir: null

      # List of datasets to evaluate on.
      datasets: null

      # Model routing: points agent LLM calls at the NeMo Gym model server alias.
      model_server:
        type: responses_api_models
        name: policy_model
