benchflow_agent:
  responses_api_agents:
    benchflow_agent:
      # Python module entrypoint loaded by NeMo Gym.
      entrypoint: app.py
      domain: agent
      description: BenchFlow integration for running agentic benchmarks (e.g. SkillsBench).
      value: Evaluate models on agentic benchmarks via BenchFlow.

      # Max number of concurrent `/run` requests handled by the NeMo Gym agent server process.
      concurrency: 10

      # Local directory of BenchFlow task definitions (e.g. a SkillsBench `tasks/` dir).
      tasks_dir: "responses_api_agents/benchflow_agent/data/tasks"
      # Output directory for BenchFlow results/artifacts/logs.
      jobs_dir: "responses_api_agents/benchflow_agent/jobs"

      # BenchFlow agent harness.
      agent: openhands
      # Sandbox user. "none" or null runs as root.
      sandbox_user: "none"
      # Abort a rollout if the agent makes no tool call for this many seconds.
      agent_idle_timeout: 1200
      # Skills directory passed to BenchFlow ("auto" = use task-bundled skills, None = do not use skills).
      skills_dir: auto
      # BENCHFLOW_SKILL_NUDGE value ("name" is the recommended mode when using skills, None = do not use skills).
      skill_nudge: name
      # BenchFlow usage/cost telemetry mode: "auto" | "required" | "off".
      # Quoted so YAML does not parse `off` as the boolean False.
      usage_tracking: "off"
      # API key for the LLM server.
      provider_api_key: EMPTY
      # How many times BenchFlow should retry a task on error.
      max_retries: 2

      # Overrides to apply to every task's task.toml. Example:
      #   task_config_overrides:
      #     environment:
      #       memory_mb: 131072
      #     agent:
      #       timeout_sec: 1000000000.0
      task_config_overrides: {}

      # Directory of prebuilt per-task Singularity .sif images. Files must be named "<task_name>.sif".
      images_dir: null

      # Model routing: points the in-container agent's LLM calls at the NeMo Gym
      # model server alias (resolved to an OpenAI-compatible base URL).
      model_server:
        type: responses_api_models
        name: policy_model
