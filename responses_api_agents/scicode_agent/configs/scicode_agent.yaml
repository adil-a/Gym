scicode_agent:
  responses_api_agents:
    scicode_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: scicode
      model_server:
        type: responses_api_models
        name: policy_model
      # Per-sub-step prompt template (the benchmark config may override).
      prompt_fpath: benchmarks/scicode/prompts/default.yaml
      # Inject each sub-step's scientific background into the prompt context.
      with_background: true
      # Populated by the benchmark config.
      datasets: []
