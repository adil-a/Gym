openclaw_agent:
  responses_api_agents:
    openclaw_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: ???
      concurrency: 32
      command: openclaw
      # <provider>/<model-name>. Provider name must not prefix the model name (so "nvinf", not "nvidia").
      model: nvinf/nvidia/meta/llama-3.3-70b-instruct
      workspace_root: outputs/openclaw_agent/workspaces
      openclaw_agent_id: main
      thinking: "off"
      system_prompt: null
      setup_timeout: 900
      timeout: 900
      extra_args: []
      env: {}
      # deep-merged into the config openclaw setup generates
      openclaw_config:
        models:
          providers:
            nvinf:
              api: openai-completions
              baseUrl: https://integrate.api.nvidia.com/v1
              apiKey: ${nvidia_api_key}
              models:
              - id: nvidia/meta/llama-3.3-70b-instruct
                name: nvidia/meta/llama-3.3-70b-instruct
                api: openai-completions
      openclaw_version: null
