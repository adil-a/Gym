# OpenClaw agent harness over reasoning_gym.
reasoning_gym:
  resources_servers:
    reasoning_gym:
      entrypoint: app.py
      domain: knowledge
      verified: true
      description: OpenClaw agent harness for reasoning gym tasks
      value: Evaluate model capabilities in the OpenClaw agent harness

reasoning_gym_openclaw_agent:
  responses_api_agents:
    openclaw_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: reasoning_gym
      concurrency: 8
      command: openclaw
      # <provider>/<model-name>. Provider name must not prefix the model name (so "nvinf", not "nvidia").
      model: nvinf/nvidia/meta/llama-3.3-70b-instruct
      thinking: "off"
      timeout: 600
      system_prompt: |
        You are a precise reasoning assistant. You have access to Bash to run Python for calculations.
        For every problem: think step by step, use code to verify when helpful, then give your final
        answer wrapped in <answer></answer> tags, e.g. <answer>42</answer>. Put ONLY the final answer
        inside the tags, formatted exactly as the question requests.
      openclaw_config:
        models:
          providers:
            nvinf:
              api: openai-completions
              baseUrl: ${policy_base_url}
              apiKey: ${policy_api_key}
              models:
              - id: nvidia/meta/llama-3.3-70b-instruct
                name: nvidia/meta/llama-3.3-70b-instruct
                api: openai-completions
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/reasoning_gym/data/example.jsonl
      - name: train
        type: train
        jsonl_fpath: resources_servers/reasoning_gym/data/Nemotron-RL-ReasoningGym-v1_train.jsonl
        huggingface_identifier:
          repo_id: nvidia/Nemotron-RL-ReasoningGym-v1
          artifact_fpath: data/train.jsonl
        license: Creative Commons Attribution 4.0 International
