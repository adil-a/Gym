# answer_grading_rule options: seq_match, exact (default)
# reward = answer_score * (1 - reasoning_overlap)
#   answer_score      : match of final answer vs expected_answer
#   reasoning_overlap : SequenceMatcher ratio between reasoning and the input message
lc_niah:
  resources_servers:
    lc_niah:
      entrypoint: app.py
      answer_grading_rule: exact
      domain: knowledge
      verified: false
      description: Answer-correctness reward gated by low reasoning/input overlap
      value: Reward correct answers while discouraging copying the prompt into reasoning

lc_niah_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: lc_niah
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/lc_niah/data/example.jsonl
