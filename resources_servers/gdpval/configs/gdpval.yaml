gdpval_resources_server:
  resources_servers:
    gdpval:
      entrypoint: app.py
      domain: other
      verified: false
      reward_mode: rubric
      # Multi-reference (committee) pairwise judging. Each entry is a
      # {name, deliverables_dir, elo} triple. When non-empty, ``aggregate_metrics``
      # fits one eval ELO jointly across all refs via Bradley-Terry MLE.
      # Example:
      #   committee_references:
      #     - {name: glm51,        deliverables_dir: /gdpval/refs/glm51,        elo: 1535}
      #     - {name: kimi_k25,     deliverables_dir: /gdpval/refs/kimi_k25,     elo: 1290}
      #     - {name: qwen35_397b,  deliverables_dir: /gdpval/refs/qwen35_397b,  elo: 1213}
      committee_references: []
      # Legacy single-reference fields (deprecated; auto-promoted to a
      # one-element committee when set). Prefer ``committee_references`` above.
      reference_deliverables_dir: null
      judge_model_server:
        type: responses_api_models
        name: gdpval_judge_model
      judge_responses_create_params_overrides: {}
