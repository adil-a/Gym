# OpenClaw agent harness over math_with_code.
math_with_code:
  resources_servers:
    math_with_code:
      entrypoint: app.py
      max_execution_time: 10
      domain: math
      verified: false
      description: OpenClaw agent harness for competitive math problems
      value: Improve math and tool-use capabilities in the OpenClaw agent harness

math_with_code_openclaw_agent:
  responses_api_agents:
    openclaw_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: math_with_code
      concurrency: 8
      command: openclaw
      model: nvinf/nvidia/meta/llama-3.3-70b-instruct
      thinking: "off"
      timeout: 600
      system_prompt: |
        You are a math assistant. Work step by step, running code when it helps, and always end
        with your final answer in the form \boxed{your_answer}.
      openclaw_config:
        models:
          providers:
            nvinf:
              api: openai-completions
              baseUrl: ${policy_base_url}
              apiKey: ${policy_api_key}
              models:
              - id: nvidia/meta/llama-3.3-70b-instruct
                name: nvidia/meta/llama-3.3-70b-instruct
                api: openai-completions
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/math_with_code/data/example.jsonl
