# Chain to the BenchFlow agent base config.
config_paths:
  - responses_api_agents/benchflow_agent/configs/benchflow_agent.yaml

# Inherit the base benchflow_agent server and specialize it for SkillsBench.
# (The benchmark's agent instance name is the top-level key below; it is also the
# `agent_ref.name` written into the dataset rows by prepare.py.)
skillsbench_benchflow_agent:
  _inherit_from: benchflow_agent
  responses_api_agents:
    benchflow_agent:
      # SkillsBench task definitions, cloned by prepare.py (ng_prepare_benchmark).
      tasks_dir: benchmarks/skillsbench/data/skillsbench_repo/tasks

      # Directory of prebuilt per-task Singularity .sif images. Files must be named "<task_name>.sif".
      images_dir: null

      # Overrides to apply to every task's task.toml.
      task_config_overrides:
        environment:
          memory_mb: 131072
        agent:
          timeout_sec: 1000000000.0

      datasets:
      - name: skillsbench
        type: benchmark
        jsonl_fpath: benchmarks/skillsbench/data/skillsbench_benchmark.jsonl
        prompt_config: null
        prepare_script: benchmarks/skillsbench/prepare.py
        num_repeats: 1
