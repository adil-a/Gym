# Chain to the generic translation resource server + agent config
config_paths:
  - resources_servers/wmt_translation/configs/wmt_translation.yaml

# `_inherit_from` keeps this benchmark config isolated from other benchmarks
# that might also reuse wmt_translation (future: wmt23, flores, etc.).
wmt24pp_wmt_translation_resources_server:
  _inherit_from: wmt_translation

wmt24pp_wmt_translation_simple_agent:
  _inherit_from: wmt_translation_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: wmt24pp_wmt_translation_resources_server
      datasets:
      - name: wmt24pp
        type: benchmark
        jsonl_fpath: benchmarks/wmt24pp/data/wmt24pp_benchmark.jsonl
        prompt_config: benchmarks/wmt24pp/prompts/default.yaml
        prepare_script: benchmarks/wmt24pp/prepare.py
        # num_repeats here is NOT honored for type=benchmark; it must be
        # passed as `+num_repeats=N` on the ng_collect_rollouts CLI.
        license: Creative Commons Attribution Share Alike 4.0
