# Judge model instance for physics_judge's LLM-as-judge fallback.
#
# Mirrors resources_servers/labbench2_vlm/configs/judge_model_openai.yaml so
# the same `+judge_base_url=…`, `+judge_api_key=…`, `+judge_model_name=…`
# CLI overrides work (or set them in env.yaml).
#
# Env vars are wrapped in `oc.select` so config parsing succeeds even when
# env.yaml hasn't been loaded (e.g. during `ng_list_benchmarks`). At runtime,
# set judge_base_url / judge_api_key / judge_model_name in env.yaml or on the
# CLI — the real values override the unset.* sentinels.
judge_model:
  responses_api_models:
    openai_model:
      entrypoint: app.py
      openai_base_url: ${oc.select:judge_base_url,http://unset.local/v1}
      openai_api_key: ${oc.select:judge_api_key,unset}
      openai_model: ${oc.select:judge_model_name,unset}
