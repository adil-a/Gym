name: Test inference provider keys

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "responses_api_models/chat_completions_model/**"
      - ".github/workflows/test-inference-providers.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: ${{ matrix.provider }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: fireworks
            base_url: https://api.fireworks.ai/inference/v1
            secret_name: FIREWORKS
            model: accounts/fireworks/models/llama-v3p1-8b-instruct
          - provider: openrouter
            base_url: https://openrouter.ai/api/v1
            secret_name: OPENROUTER
            model: meta-llama/llama-3.1-8b-instruct
          - provider: deepinfra
            base_url: https://api.deepinfra.com/v1/openai
            secret_name: DEEPINFRA
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
          - provider: friendli
            base_url: https://inference.friendli.ai/v1
            secret_name: FRIENDLIAI
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
          - provider: baseten
            base_url: https://bridge.baseten.co/v1
            secret_name: BASETEN
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
          - provider: hf_inference
            base_url: https://router.huggingface.co/v1
            secret_name: HUGGINGFACE
            model: meta-llama/Meta-Llama-3.1-8B-Instruct
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install openai client
        run: pip install "openai>=1.0,<3"

      - name: Verify API key is set
        env:
          API_KEY: ${{ secrets[matrix.secret_name] }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::Secret ${{ matrix.secret_name }} is not set"
            exit 1
          fi
          echo "Secret ${{ matrix.secret_name }} is configured"

      - name: Smoke test chat completion
        env:
          API_KEY: ${{ secrets[matrix.secret_name] }}
        run: |
          python - <<'PYEOF'
          import os, sys, traceback
          from openai import OpenAI

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          provider = "${{ matrix.provider }}"
          model = "${{ matrix.model }}"
          client = OpenAI(
              base_url="${{ matrix.base_url }}",
              api_key=os.environ["API_KEY"],
          )

          def write_summary(msg):
              with open(summary_file, "a") as f:
                  f.write(msg + "\n")

          write_summary(f"## {provider}")
          write_summary(f"- base_url: `${{ matrix.base_url }}`")
          write_summary(f"- model: `{model}`")
          write_summary("")

          # Step 1: list models (best-effort)
          try:
              models = client.models.list()
              names = sorted(m.id for m in models.data)[:20]
              write_summary(f"### Available models (first 20 of {len(models.data)})")
              for n in names:
                  write_summary(f"- `{n}`")
              write_summary("")
          except Exception as e:
              write_summary(f"### /v1/models failed")
              write_summary(f"```\n{e}\n```\n")

          # Step 2: chat completion
          print(f"Testing {provider} with model {model} ...")
          try:
              response = client.chat.completions.create(
                  model=model,
                  messages=[{"role": "user", "content": "Say 'hello' and nothing else."}],
                  max_tokens=16,
                  temperature=0,
              )
              content = response.choices[0].message.content
              print(f"✓ {provider}: {content!r}")
              write_summary(f"### Chat completion: ✅ PASS")
              write_summary(f"- response: `{content}`")
              write_summary(f"- model returned: `{response.model}`")
          except Exception as e:
              tb = traceback.format_exc()
              print(f"✗ {provider}: {e}", file=sys.stderr)
              write_summary(f"### Chat completion: ❌ FAIL")
              write_summary(f"```\n{tb}\n```")
              sys.exit(1)
          PYEOF
