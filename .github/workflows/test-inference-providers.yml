name: Test inference provider keys

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "responses_api_models/chat_completions_model/**"
      - ".github/workflows/test-inference-providers.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER }}
      FRIENDLIAI_API_KEY: ${{ secrets.FRIENDLIAI }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Setup and install
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv --python 3.12
          source .venv/bin/activate
          uv sync --extra dev

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          pytest responses_api_models/chat_completions_model/tests/test_integration.py \
            -m integration \
            -v \
            --tb=short
