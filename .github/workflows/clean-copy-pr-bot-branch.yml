name: Clean up copy-pr-bot branch

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete pull-request branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `pull-request/${context.payload.pull_request.number}`;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted branch ${branch}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Branch ${branch} does not exist, nothing to clean up`);
              } else {
                throw error;
              }
            }
