repos:
  - repo: local
    hooks:
      - id: python-end-of-file-fixer
        name: Fix Python end-of-file newlines
        language: system
        entry: uv run --no-project python scripts/precommit_python_fixes.py --end-of-file
        files: \.py$
      - id: python-trailing-whitespace
        name: Trim Python trailing whitespace
        language: system
        entry: uv run --no-project python scripts/precommit_python_fixes.py --trailing-whitespace
        files: \.py$
      - id: ruff
        name: ruff
        language: system
        entry: uv run --no-project --with ruff==0.9.9 ruff
        args: ["check", "--force-exclude", "--fix"]
        types_or: [python, pyi, jupyter]
      - id: ruff-imports
        name: ruff import sorting
        language: system
        entry: uv run --no-project --with ruff==0.9.9 ruff
        args: ["check", "--force-exclude", "--select", "I", "--fix"]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run --no-project --with ruff==0.9.9 ruff
        args: ["format", "--force-exclude"]
        types_or: [python, pyi, jupyter]
      - id: no-underscore-md
        name: "Disallow '_' in Markdown filenames"
        language: system
        entry: |
          bash -c '
            # Report the offending files
            echo "[pre-commit] ERROR: Found Markdown files with underscores:" >&2
            for file in "$@"; do
              echo "  - $file (use hyphens instead)" >&2
            done
            exit 1
          '
        files: '.*\/[^\/]*_[^\/]*\.md$'
        exclude: '^\.github/'
        types: [file]
      - id: add-verified-flag
        name: Add verified flag to resources server configs
        language: python
        entry: python scripts/add_verified_flag.py
        additional_dependencies: [pyyaml]
        files: ^resources_servers/.*/configs/.*\.yaml$
        pass_filenames: true
      - id: update-readme-table
        name: Update environment list in README
        language: python
        entry: python scripts/update_env_list.py
        additional_dependencies: [pyyaml]
        files: ^README\.md$|^resources_servers/.*/configs/.*\.yaml$|^responses_api_agents/.*/configs/.*\.yaml$
